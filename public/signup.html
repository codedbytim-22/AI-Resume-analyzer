<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | Resume Analyzer</title>
    <link rel="stylesheet" href="Assets/CSS/style.css" />
    <style>
      /* M-Pesa Modal Styling */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
      }
      .modal-content {
        background: white;
        margin: 10% auto;
        padding: 0;
        border-radius: 12px;
        width: 90%;
        max-width: 400px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      .modal-header {
        background: #1eb53a;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: sans-serif;
      }
      .modal-body {
        padding: 20px;
        font-family: sans-serif;
      }
      .close-btn {
        cursor: pointer;
        font-size: 24px;
        color: white;
        line-height: 1;
      }
      .btn-mpesa-send {
        background: #1eb53a;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        font-size: 1rem;
      }
      .btn-mpesa-send:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .status-msg {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
        display: none;
        text-align: center;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body class="page-container">
    <header>
      <div class="container header-content">
        <a href="index.html" class="logo">
          <div class="logo-icon">RAS</div>
          <span>Resume Analyzer</span>
        </a>
        <nav aria-label="Primary Navigation">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html" aria-current="page">Sign up</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container form-container">
        <div class="form-card">
          <h2 class="form-title">Create Your Account</h2>
          <p class="form-subtitle">
            Start analyzing your resume with AI-powered insights
          </p>

          <form id="signupForm">
            <div class="form-group">
              <label for="fullName" class="form-label">Full Name</label>
              <input
                type="text"
                id="fullName"
                class="form-input"
                required
                placeholder="John Doe"
              />
            </div>

            <div class="form-group">
              <label for="email" class="form-label">Email address</label>
              <input
                type="email"
                id="email"
                class="form-input"
                required
                placeholder="you@example.com"
              />
            </div>

            <div class="form-group">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                id="password"
                class="form-input"
                required
                placeholder="Create a password (min. 6 characters)"
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword" class="form-label"
                >Confirm Password</label
              >
              <input
                type="password"
                id="confirmPassword"
                class="form-input"
                required
                placeholder="Confirm your password"
              />
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Create Account
            </button>

            <div
              style="
                text-align: center;
                margin-top: 25px;
                padding-top: 20px;
                border-top: 1px solid #eee;
              "
            >
              <p style="font-size: 0.85rem; color: #666; margin-bottom: 10px">
                Premium Activation Required
              </p>
              <button type="button" id="openMpesa" class="btn-mpesa-send">
                Pay with M-Pesa (KES 100)
              </button>
            </div>

            <p class="text-center mt-3">
              Already have an account?
              <a href="login.html" class="text-link">Login</a>
            </p>
          </form>
        </div>
      </div>
    </main>

    <footer>
      <div class="container footer-content">
        <p>&copy; 2026 Resume Analysis System. All rights reserved.</p>
      </div>
    </footer>

    <div id="mpesaModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <strong>Lipa na M-Pesa</strong>
          <span class="close-btn" id="closeMpesa">&times;</span>
        </div>
        <div class="modal-body">
          <div id="paymentStatus" class="status-msg"></div>
          <div class="form-group" style="margin-bottom: 15px">
            <label class="form-label" style="display: block; margin-bottom: 5px"
              >Phone Number</label
            >
            <input
              type="number"
              id="mpesaPhone"
              class="form-input"
              placeholder="2547XXXXXXXX"
              value="2547"
              style="
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
              "
            />
            <small style="color: #666">Enter number in 254 format</small>
          </div>
          <button
            type="button"
            id="initiateStk"
            class="btn-mpesa-send"
            style="margin-top: 0"
          >
            Send STK Prompt
          </button>
        </div>
      </div>
    </div>

    <script>
      const modal = document.getElementById("mpesaModal");
      const openBtn = document.getElementById("openMpesa");
      const closeBtn = document.getElementById("closeMpesa");
      const initiateBtn = document.getElementById("initiateStk");

      // Open Modal
      openBtn.onclick = () => {
        modal.style.display = "block";
      };

      // Close Modal
      closeBtn.onclick = () => {
        modal.style.display = "none";
        document.getElementById("paymentStatus").style.display = "none"; // Reset status
      };

      // Close if clicking outside the modal
      window.onclick = (event) => {
        if (event.target == modal) {
          modal.style.display = "none";
        }
      };

      // Handle the STK Push Request
      initiateBtn.onclick = async () => {
        const phone = document.getElementById("mpesaPhone").value;
        const statusDiv = document.getElementById("paymentStatus");

        if (phone.length < 12 || !phone.startsWith("254")) {
          alert("Please enter a valid phone number starting with 254.");
          return;
        }

        initiateBtn.disabled = true;
        initiateBtn.innerText = "Processing...";
        statusDiv.style.display = "none";

        try {
          // Pointing to your PHP backend file
          const response = await fetch("mpesa_gateway.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `phone=${phone}&amount=1&initiate_mpesa=1`,
          });

          const data = await response.json();

          statusDiv.style.display = "block";
          statusDiv.innerText = data.message;
          statusDiv.style.background =
            data.status === "success" ? "#d4edda" : "#f8d7da";
          statusDiv.style.color =
            data.status === "success" ? "#155724" : "#721c24";
        } catch (e) {
          statusDiv.style.display = "block";
          statusDiv.innerText =
            "Error connecting to server. Ensure mpesa_gateway.php exists.";
          statusDiv.style.background = "#f8d7da";
          statusDiv.style.color = "#721c24";
        } finally {
          initiateBtn.disabled = false;
          initiateBtn.innerText = "Send STK Prompt";
        }
      };
    </script>

    <script type="module" src="Assets/JS/app.js"></script>
  </body>
</html>
